server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Global CORS for all routes
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:

        # ===== security-service routes (PUBLIC — no JWT check) =====
        - id: security-service-auth
          uri: lb://security-service
          predicates:
            - Path=/auth/**
          filters:
            - name: JwtAuthenticationFilter
              args:
                secured: false

        # ===== quantity-measurement-app routes (SECURED — JWT required) =====
        - id: quantity-measurement-app
          uri: lb://quantity-measurement-app
          predicates:
            - Path=/api/v1/quantities/**
          filters:
            - name: JwtAuthenticationFilter
              args:
                secured: true

# JWT secret (same as security-service and quantity-service)
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway